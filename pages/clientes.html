<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes | J'amile Essence Care</title>
    <link rel="stylesheet" href="../src/css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="admin-page">
    <div class="container">
        <header class="header-main">
            <div class="brand-section">
                <span class="logo-j">J'</span><span class="logo-amile">amile</span>
                <p>Gestão de Clientes</p>
            </div>
            <button class="btn-primary" onclick="abrirModal()">+ Novo Cliente</button>
        </header>

        <section class="table-wrapper">
            <table id="clientesTable">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>CPF</th>
                    </tr>
                </thead>
                <tbody id="listaClientes">
                </tbody>
            </table>
        </section>
    </div>

    <div id="modalCliente" class="modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h3>Novo Cliente J'amile</h3>
                <button class="btn-close" onclick="fecharModal()">&times;</button>
            </header>
            <form id="formCadastroCliente">
                <div class="input-row">
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="cadNome" required placeholder="Ex: Maria Silva">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="cadEmail" required placeholder="maria@email.com">
                    </div>
                    <div class="input-group">
                        <label>Telefone</label>
                        <input type="text" id="cadTelefone" placeholder="(47) 99999-9999">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>CPF</label>
                        <input type="text" id="cadCpf" placeholder="000.000.000-00">
                    </div>
                </div>
                <footer class="modal-footer">
                    <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar Cliente</button>
                </footer>
            </form>
        </div>
    </div>
    <script src="../src/js/modules/clientes.js"></script>
</body>

</html>
